<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Premiro Products</title>
<link rel="stylesheet" href="premro styels/sect page.css">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<!-- Search Bar -->
<div style="position:relative; display:inline-block; margin-bottom:20px;">
    <input class="search-bar" type="text" id="searchInput" placeholder="Search products..." onkeyup="showSuggestions()" style="padding:8px; width:300px;">
    <div id="suggestions"></div>
</div>

<!-- Filter Bar -->
<div id="filterBar" style="padding:15px; display:flex; gap:10px; flex-wrap:wrap;">
    <button class="filter" onclick="filterProducts('all')">All</button>
    <button class="filter" onclick="filterProducts('Original')">Original</button>
    <button class="filter" onclick="filterProducts('Mirror')">Mirror</button>
    <button class="filter" onclick="filterProducts('Highcopy')">High Copy</button> 
</div>

<!-- Products container -->
<div class="products-container">
    <!-- PRODUCT 52  --> 
    <a href="product52.html" class="product-card shoes Highcopy">
        <img src="premro img/FG.jpeg" alt="Nike Air Max Pink">
        <h3>Nike Air Max Pink High Copy</h3>
        <p>850 EGP</p>
    </a>
    
    <!-- PRODUCT 53  --> 
    <a href="product53.html" class="product-card shoes Highcopy">
        <img src="premro img/f12.jpeg" alt="Nike Air Max Light Blue">
        <h3>Nike Air Max Light Blue High Copy</h3>
        <p>850 EGP</p>
    </a>
    
    <!-- PRODUCT 54  --> 
    <a href="product54.html" class="product-card shoes Highcopy">
        <img src="premro img/fgh.jpeg" alt="Nike Air Max Black">
        <h3>Nike Air Max Black High Copy</h3>
        <p>850 EGP</p>
    </a>
    
    <!-- PRODUCT 55  --> 
    <a href="product55.html" class="product-card shoes Highcopy">
        <img src="premro img/p9.jpeg" alt="Nike Air Max White">
        <h3>Nike Air Max White High Copy</h3>
        <p>850 EGP</p>
    </a>
</div>

<!-- JS for search suggestions and filtering -->
<script>
const products = Array.from(document.getElementsByClassName('product-card'));
const searchInput = document.getElementById('searchInput');
const suggestionsDiv = document.getElementById('suggestions');

function showSuggestions() {
    const input = searchInput.value.toLowerCase();
    suggestionsDiv.innerHTML = '';

    if (input === '') {
        products.forEach(prod => prod.style.display = 'inline-block');
        return;
    }

    const matches = products.filter(prod => {
        const name = prod.getElementsByTagName('h3')[0].innerText.toLowerCase();
        return name.includes(input);
    });

    products.forEach(prod => prod.style.display = 'none');

    matches.forEach(prod => {
        prod.style.display = 'inline-block';
        
        const suggestion = document.createElement('div');
        suggestion.innerText = prod.getElementsByTagName('h3')[0].innerText;
        suggestion.onclick = () => {
            window.location.href = prod.getAttribute('href');
        };
        suggestionsDiv.appendChild(suggestion);
    });
}

searchInput.addEventListener('keypress', function (e) {
    if (e.key === 'Enter') {
        const input = searchInput.value.toLowerCase();
        const firstMatch = products.find(prod => {
            const name = prod.getElementsByTagName('h3')[0].innerText.toLowerCase();
            return name.includes(input);
        });

        if (firstMatch) {
            window.location.href = firstMatch.getAttribute('href');
        }
    }
});

function filterProducts(category) {
    products.forEach(card => {
        if (category === "all" || card.classList.contains(category)) {
            card.style.display = "inline-block";
        } else {
            card.style.display = "none";
        }
    });
}
</script>

</body>
</html>
